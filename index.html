<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drapeaux du Monde</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1f6e;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: #1a1f6e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.5s ease;
  }
  #splash .globe { font-size: 5rem; animation: bounce 1.2s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  #splash h1 {
    color: #fff;
    font-size: 1.6rem;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
  }
  #splash h1 span { color: #ffd700; }
  #splash p { color: rgba(255,255,255,0.6); font-size: 0.95rem; text-align: center; padding: 0 30px; }
  #startBtn {
    margin-top: 10px;
    background: #ffd700;
    color: #1a1f6e;
    border: none;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 800;
    padding: 18px 48px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,215,0,0.4);
    animation: pulse-btn 1.8s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes pulse-btn {
    0%,100% { transform: scale(1); box-shadow: 0 6px 24px rgba(255,215,0,0.4); }
    50% { transform: scale(1.06); box-shadow: 0 10px 36px rgba(255,215,0,0.6); }
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  /* ── HEADER ── */
  header {
    background: rgba(255,255,255,0.08);
    padding: 14px 16px 10px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  header h1 { color: #fff; font-size: 1rem; font-weight: 700; opacity: 0.8; }

  /* ── GRID ── */
  main { padding: 10px 10px 100px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  @media (min-width: 500px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 700px) { .grid { grid-template-columns: repeat(7, 1fr); } }

  /* ── FLAG CARD ── */
  .flag-card {
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 4px 8px;
    transition: transform 0.12s, border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .flag-card:active { transform: scale(0.88); }
  .flag-card.active {
    border-color: #ffd700;
    background: rgba(255,215,0,0.15);
    animation: card-pop 0.3s ease;
  }
  @keyframes card-pop {
    0% { transform: scale(0.88); }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .flag-emoji { font-size: 2rem; line-height: 1; margin-bottom: 5px; }
  .flag-name {
    font-size: 0.52rem;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    text-align: center;
    line-height: 1.2;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 2px;
  }
  .flag-card.active .flag-name { color: #ffd700; }

  /* ── POPUP NOM ── */
  #popup {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #2d2fa8, #4a1fa8);
    border-radius: 28px 28px 0 0;
    padding: 24px 24px 40px;
    text-align: center;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    border-top: 2px solid rgba(255,215,0,0.3);
    pointer-events: none;
  }
  #popup.show { transform: translateY(0); }
  #popup .pop-flag { font-size: 3.5rem; margin-bottom: 8px; display: block; }
  #popup .pop-name {
    color: #fff;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  #popup .pop-hint {
    color: rgba(255,255,255,0.45);
    font-size: 0.75rem;
    margin-top: 8px;
  }
  #popup .speaker { font-size: 1.1rem; margin-left: 6px; }
</style>
</head>
<body>

<!-- SPLASH : unique point d'entrée, déclenche l'audio iOS -->
<div id="splash">
  <div class="globe">🌍</div>
  <h1>Les <span>Drapeaux</span><br>du Monde</h1>
  <p>Appuie sur un drapeau pour entendre son nom !</p>
  <button id="startBtn">C'est parti ! 🚀</button>
</div>

<header>
  <h1>🌍 Les Drapeaux du Monde — 193 pays</h1>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div id="popup">
  <span class="pop-flag" id="popFlag"></span>
  <div class="pop-name" id="popName"></div>
  <div class="pop-hint">🔊 <span id="popHint">lecture en cours…</span></div>
</div>

function codeToFlag(code) {
  return code.toUpperCase().split('').map(c =>
    String.fromCodePoint(c.charCodeAt(0) + 127397)
  ).join('');
}

// — Speech setup —
const synth = window.speechSynthesis;
let voices = [];
let audioUnlocked = false;
let popupTimer = null;
let activeCard = null;

function loadVoices() {
  voices = synth.getVoices();
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(text) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = 0.88;
  u.pitch = 1.1;
  const frVoice = voices.find(v => v.lang && v.lang.startsWith('fr'));
  if (frVoice) u.voice = frVoice;
  synth.speak(u);
}

// — Build grid —
const grid = document.getElementById('grid');
COUNTRIES.forEach(([code, name, spoken]) => {
  const flag = codeToFlag(code);
  const card = document.createElement('div');
  card.className = 'flag-card';
  card.innerHTML = `<span class="flag-emoji">${flag}</span><span class="flag-name">${name}</span>`;
  card.addEventListener('click', () => {
    if (!audioUnlocked) return; // splash not dismissed yet
    // Card highlight
    if (activeCard) activeCard.classList.remove('active');
    card.classList.add('active');
    activeCard = card;
    // Popup
    document.getElementById('popFlag').textContent = flag;
    document.getElementById('popName').textContent = name;
    document.getElementById('popHint').textContent = 'lecture en cours…';
    document.getElementById('popup').classList.add('show');
    clearTimeout(popupTimer);
    popupTimer = setTimeout(() => {
      document.getElementById('popup').classList.remove('show');
      if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
    }, 3000);
    // Speak
    speak(spoken);
  });
  grid.appendChild(card);
});

// — Splash button — unlocks audio on iOS —
document.getElementById('startBtn').addEventListener('click', () => {
  // Warm up audio context with a silent utterance (iOS requirement)
  const warmup = new SpeechSynthesisUtterance(' ');
  warmup.volume = 0;
  synth.speak(warmup);
  audioUnlocked = true;
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => document.getElementById('splash').remove(), 600);
});
</script>
